<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study-Sync | AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Study-Sync</h1>
            <button id="theme-toggle" class="btn-secondary">Toggle Mode</button>
        </header>
        <main class="main-content">
            <!-- User Input Interface Form -->
            <section class="card form-section">
                <h2>Set Your Session</h2>
                <form action="/" method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="syllabus">Upload Study PDF:</label>
                        <input type="file" id="syllabus" name="syllabus" accept=".pdf" required>
                    </div>
                    <div class="time-range">
                        <div class="form-group">
                            <label for="start_time">Start:</label>
                            <input type="time" id="start_time" name="start_time" required>
                        </div>
                        <div class="form-group">
                            <label for="end_time">End:</label>
                            <input type="time" id="end_time" name="end_time" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Generate Schedule</button>
                </form>
            </section>

            <!-- Dynamic Interactive Timeline Generation Output -->
            <section class="card output-section">
                <h2>Your Custom Plan</h2>
                {% if generated %}
                    <div class="timeline">
                        {% for item in plan %}
                            <div class="timeline-item">
                                <span class="time-badge">{{ item.time }}</span>
                                <p class="activity-text">{{ item.activity }}</p>
                            </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p class="placeholder-text">Upload your material to build a customized timeline.</p>
                {% endif %}
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
